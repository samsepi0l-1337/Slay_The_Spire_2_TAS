name: Build Windows Executable

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/windows-exe.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/build-windows-exe.ps1"
      - "data/fixtures/**"
      - "tests/**"
      - "config/**"
      - "bridge/Sts2TelemetryBridge/**"
      - "src/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build executable
        shell: pwsh
        run: ./scripts/build-windows-exe.ps1

      - name: Smoke executable
        shell: pwsh
        run: ./dist/sts2-tas.exe --help

      - name: Smoke PyTorch train in frozen exe
        shell: pwsh
        run: |
          $model = Join-Path $env:RUNNER_TEMP "ml-smoke.pt"
          ./dist/sts2-tas.exe train-bc `
            --dataset data/fixtures/ml-train-smoke.jsonl `
            --model $model
          if (-not (Test-Path $model)) { throw "train-bc did not write model: $model" }

      - name: Smoke fixture bridge contract in frozen exe
        shell: pwsh
        run: |
          ./dist/sts2-tas.exe bridge-smoke --fixture data/fixtures/telemetry-combat.json

      - name: Smoke dry-run action planner in frozen exe
        shell: pwsh
        run: |
          ./dist/sts2-tas.exe act --action-json '{"action_type":"end_turn","args":{}}'

      - name: Upload executable
        uses: actions/upload-artifact@v5
        with:
          name: sts2-tas-windows-x64
          path: dist/sts2-tas.exe
          if-no-files-found: error
